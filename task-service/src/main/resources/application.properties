spring.application.name=task-service
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/task_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

user.service.grpc.host=localhost
user.service.grpc.port=9091
spring.graphql.graphiql.enabled=true
