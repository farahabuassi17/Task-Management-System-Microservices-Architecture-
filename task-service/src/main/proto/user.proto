syntax = "proto3";

package user;

option java_multiple_files = true;
option java_package = "com.farah.taskmanagement.taskservice.task";
option java_outer_classname = "UserProto";

service UserGrpcService {
  rpc GetUserById(UserByIdRequest) returns (UserReply);
}

message UserByIdRequest {
  string id = 1;
}

message UserReply {
  string id = 1;
  string full_name = 2;
  string email = 3;
  string role = 4;
  bool active = 5;
}
